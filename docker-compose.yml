services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    entrypoint: /bin/sh -c "ollama serve & sleep 10 && ollama pull llama3.2 && tail -f /dev/null"

  andrea:
    image: nousresearch/hermes-agent:latest
    depends_on:
      - ollama
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_TOKEN}
    volumes:
      - ./.hermes:/opt/data
    restart: always
    command: gateway run

volumes:
  ollama_data:
