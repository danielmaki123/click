services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    entrypoint: /bin/sh -c "ollama serve & sleep 10; for i in 1 2 3 4 5; do ollama list >/dev/null 2>&1 && break; sleep 3; done; ollama pull llama3.2; wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - andrea-net

  andrea:
    image: nousresearch/hermes-agent:latest
    depends_on:
      - ollama
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_TOKEN}
      GATEWAY_ALLOW_ALL_USERS: "true"
      DEPLOY_TIMESTAMP: "2026-05-08T23:05:00"
    volumes:
      - ./.hermes:/opt/data
    restart: always
    command: gateway run
    networks:
      - andrea-net

volumes:
  ollama_data:

networks:
  andrea-net:
    driver: bridge
